name: Keep Render Warm

on:
  schedule:
    - cron: "*/13 * * * *" # every 13 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -m 8 -s -o /dev/null -w "%{http_code}\n" "$RENDER_HEALTH_URL"
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
